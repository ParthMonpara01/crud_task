<div class="toast-container position-fixed start-50 translate-middle-x p-3" 
     style="top: 70px; z-index: 2000;">
  <div *ngFor="let toast of toasts$ | async" 
       class="toast show align-items-center text-white border-0 mb-2" 
       [ngClass]="'bg-' + toast.type" 
       role="alert" 
       aria-live="assertive" 
       aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body d-flex align-items-center">
        <!-- Type icon -->
        <i class="bi me-2 fs-5" 
           [ngClass]="{
             'bi-check-circle-fill': toast.type === 'success',
             'bi-exclamation-triangle-fill': toast.type === 'warning',
             'bi-x-circle-fill': toast.type === 'danger'
           }"></i>
        <span>{{ toast.message }}</span>
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="remove(toast.id)" aria-label="Close"></button>
    </div>
  </div>
</div>
